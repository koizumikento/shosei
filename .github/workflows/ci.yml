name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks + CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests (core + integration suite)
        run: cargo test --workspace

      - name: Smoke repo discovery (single-book + series resolution)
        run: cargo test -p shosei-core --test repo_discovery

      - name: Smoke CLI init (interactive scaffold)
        run: cargo test -p shosei-cli --test cli_smoke init_cli_interactive_shows_summary_and_writes_after_confirmation -- --exact

      - name: Smoke CLI explain (resolved config)
        run: cargo test -p shosei-cli --test cli_smoke explain_cli_prints_resolved_values_and_workspace_summary -- --exact

      - name: Smoke CLI validate (issue preview)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_prints_issue_preview -- --exact

      - name: Smoke CLI validate (JSON report)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_can_emit_json_report -- --exact

      - name: Smoke CLI validate (epubcheck validator run)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_includes_epubcheck_runs -- --exact

      - name: Smoke CLI validate (epubcheck missing tool)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_records_missing_epubcheck_without_failing -- --exact

      - name: Smoke CLI validate (epubcheck failure)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_fails_when_epubcheck_reports_errors -- --exact

      - name: Smoke CLI validate (print validator run)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_includes_print_validator_runs -- --exact

      - name: Smoke CLI validate (print validator missing tool)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_records_missing_print_validator_without_failing -- --exact

      - name: Smoke CLI validate (print validator failure)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_fails_when_print_validator_reports_errors -- --exact

      - name: Smoke CLI validate (Kindle Previewer validator run)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_json_includes_kindle_previewer_runs -- --exact

      - name: Smoke CLI build (artifact output)
        run: cargo test -p shosei-cli --test cli_smoke build_cli_prints_tools_and_writes_artifact -- --exact

      - name: Smoke CLI preview (artifact output)
        run: cargo test -p shosei-cli --test cli_smoke preview_cli_prints_summary_and_writes_artifact -- --exact

      - name: Smoke CLI preview (watch loop)
        run: cargo test -p shosei-cli --test cli_smoke preview_watch_cli_prints_initial_summary_and_watch_roots -- --exact

      - name: Smoke CLI page check (report output)
        run: cargo test -p shosei-cli --test cli_smoke page_check_cli_prints_summary_and_issue_preview -- --exact

      - name: Smoke CLI chapter add (config update)
        run: cargo test -p shosei-cli --test cli_smoke chapter_add_cli_updates_config_and_creates_stub_file -- --exact

      - name: Smoke CLI chapter move (config update)
        run: cargo test -p shosei-cli --test cli_smoke chapter_move_cli_reorders_chapters -- --exact

      - name: Smoke CLI chapter remove (config update)
        run: cargo test -p shosei-cli --test cli_smoke chapter_remove_cli_updates_config_and_keeps_file_by_default -- --exact

      - name: Smoke CLI chapter renumber (config rewrite)
        run: cargo test -p shosei-cli --test cli_smoke chapter_renumber_cli_rewrites_prefixes_and_updates_config -- --exact

      - name: Smoke CLI reference scaffold (workspace init)
        run: cargo test -p shosei-cli --test cli_smoke reference_scaffold_cli_creates_workspace -- --exact

      - name: Smoke CLI reference map (report output)
        run: cargo test -p shosei-cli --test cli_smoke reference_map_cli_prints_summary_and_writes_report -- --exact

      - name: Smoke CLI reference check (issue preview)
        run: cargo test -p shosei-cli --test cli_smoke reference_check_cli_prints_issue_preview_and_fails_on_errors -- --exact

      - name: Smoke CLI reference drift (report output)
        run: cargo test -p shosei-cli --test cli_smoke reference_drift_cli_writes_report_and_fails_on_drift -- --exact

      - name: Smoke CLI reference sync (scope copy)
        run: cargo test -p shosei-cli --test cli_smoke reference_sync_cli_copies_shared_entry_into_book_scope -- --exact

      - name: Smoke CLI story scaffold (workspace init)
        run: cargo test -p shosei-cli --test cli_smoke story_scaffold_cli_creates_workspace -- --exact

      - name: Smoke CLI story seed (scene scaffolding)
        run: cargo test -p shosei-cli --test cli_smoke story_seed_cli_creates_scenes_and_notes_from_template -- --exact

      - name: Smoke CLI story map (report output)
        run: cargo test -p shosei-cli --test cli_smoke story_map_cli_prints_summary_and_writes_report -- --exact

      - name: Smoke CLI story check (report output)
        run: cargo test -p shosei-cli --test cli_smoke story_check_cli_writes_report_and_fails_on_errors -- --exact

      - name: Smoke CLI story drift (report output)
        run: cargo test -p shosei-cli --test cli_smoke story_drift_cli_writes_report_and_fails_on_drift -- --exact

      - name: Smoke CLI story sync (scope copy)
        run: cargo test -p shosei-cli --test cli_smoke story_sync_cli_copies_shared_entity_into_book_scope -- --exact

      - name: Smoke CLI series sync (catalog output)
        run: cargo test -p shosei-cli --test cli_smoke series_sync_cli_generates_catalog_and_updates_books -- --exact

      - name: Smoke CLI handoff (proof package)
        run: cargo test -p shosei-cli --test cli_smoke handoff_proof_cli_packages_review_packet -- --exact

      - name: Smoke CLI handoff (kindle package)
        run: cargo test -p shosei-cli --test cli_smoke handoff_kindle_cli_packages_manifest_with_artifact_details -- --exact

      - name: Smoke CLI handoff (print package)
        run: cargo test -p shosei-cli --test cli_smoke handoff_print_cli_packages_manga_pdf -- --exact

      - name: Smoke CLI doctor (JSON context)
        run: cargo test -p shosei-cli --test cli_smoke doctor_json_cli_includes_detected_project_context -- --exact

      - name: Smoke CLI help (entrypoint)
        run: cargo run -p shosei-cli --bin shosei -- --help

  vscode:
    name: VS Code adapter checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install VS Code adapter dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Run VS Code adapter syntax checks
        working-directory: editors/vscode
        run: npm run check

      - name: Run VS Code adapter unit tests
        working-directory: editors/vscode
        run: npm test

      - name: Run VS Code adapter host smoke (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: editors/vscode
        run: xvfb-run -a npm run test:host

      - name: Run VS Code adapter host smoke (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        working-directory: editors/vscode
        run: npm run test:host

      - name: Run packaged VSIX smoke
        if: matrix.os == 'ubuntu-latest'
        working-directory: editors/vscode
        run: xvfb-run -a npm run test:package-smoke
