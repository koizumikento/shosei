name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks + CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests (core + integration suite)
        run: cargo test --workspace

      - name: Smoke repo discovery (single-book + series resolution)
        run: cargo test -p shosei-core --test repo_discovery

      - name: Smoke CLI init (interactive scaffold)
        run: cargo test -p shosei-cli --test cli_smoke init_cli_interactive_shows_summary_and_writes_after_confirmation -- --exact

      - name: Smoke CLI validate (issue preview)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_prints_issue_preview -- --exact

      - name: Smoke CLI validate (JSON report)
        run: cargo test -p shosei-cli --test cli_smoke validate_cli_can_emit_json_report -- --exact

      - name: Smoke CLI build (artifact output)
        run: cargo test -p shosei-cli --test cli_smoke build_cli_prints_tools_and_writes_artifact -- --exact

      - name: Smoke CLI preview (artifact output)
        run: cargo test -p shosei-cli --test cli_smoke preview_cli_prints_summary_and_writes_artifact -- --exact

      - name: Smoke CLI page check (report output)
        run: cargo test -p shosei-cli --test cli_smoke page_check_cli_prints_summary_and_issue_preview -- --exact

      - name: Smoke CLI chapter add (config update)
        run: cargo test -p shosei-cli --test cli_smoke chapter_add_cli_updates_config_and_creates_stub_file -- --exact

      - name: Smoke CLI reference scaffold (workspace init)
        run: cargo test -p shosei-cli --test cli_smoke reference_scaffold_cli_creates_workspace -- --exact

      - name: Smoke CLI reference check (issue preview)
        run: cargo test -p shosei-cli --test cli_smoke reference_check_cli_prints_issue_preview_and_fails_on_errors -- --exact

      - name: Smoke CLI story seed (scene scaffolding)
        run: cargo test -p shosei-cli --test cli_smoke story_seed_cli_creates_scenes_and_notes_from_template -- --exact

      - name: Smoke CLI series sync (catalog output)
        run: cargo test -p shosei-cli --test cli_smoke series_sync_cli_generates_catalog_and_updates_books -- --exact

      - name: Smoke CLI handoff (proof package)
        run: cargo test -p shosei-cli --test cli_smoke handoff_proof_cli_packages_review_packet -- --exact

      - name: Smoke CLI handoff (kindle package)
        run: cargo test -p shosei-cli --test cli_smoke handoff_kindle_cli_packages_manifest_with_artifact_details -- --exact

      - name: Smoke CLI handoff (print package)
        run: cargo test -p shosei-cli --test cli_smoke handoff_print_cli_packages_manga_pdf -- --exact

      - name: Smoke CLI doctor (JSON context)
        run: cargo test -p shosei-cli --test cli_smoke doctor_json_cli_includes_detected_project_context -- --exact

      - name: Smoke CLI help (entrypoint)
        run: cargo run -p shosei-cli --bin shosei -- --help

  vscode:
    name: VS Code adapter checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax check extension entrypoints
        working-directory: editors/vscode
        run: |
          node --check extension.js
          node --check src/core.js
          node --check src/view.js

      - name: Run VS Code adapter tests
        working-directory: editors/vscode
        run: node --test ./test/**/*.test.js

      - name: Package VSIX
        if: matrix.os == 'ubuntu-latest'
        working-directory: editors/vscode
        run: npm run package
