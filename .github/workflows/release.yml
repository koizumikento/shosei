name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<shosei-cli-version>."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      cli_version: ${{ steps.meta.outputs.cli_version }}
      extension_version: ${{ steps.meta.outputs.extension_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      vsix_name: ${{ steps.meta.outputs.vsix_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          cargo_metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          cli_pkg = next(pkg for pkg in cargo_metadata["packages"] if pkg["name"] == "shosei-cli")
          cli_version = cli_pkg["version"]

          with open("editors/vscode/package.json", "r", encoding="utf-8") as fh:
              extension_version = json.load(fh)["version"]

          default_tag = f"v{cli_version}"
          tag = os.environ.get("INPUT_TAG") or default_tag

          if os.environ.get("GITHUB_EVENT_NAME") == "push":
              tag = os.environ["GITHUB_REF_NAME"]
              if tag != default_tag:
                  raise SystemExit(
                      f"Tag {tag} does not match shosei-cli version {cli_version}. Expected {default_tag}."
                  )

          outputs = {
              "cli_version": cli_version,
              "extension_version": extension_version,
              "tag": tag,
              "release_title": f"shosei {cli_version}",
              "vsix_name": f"shosei-vscode-{extension_version}.vsix",
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")
          PY

  quality:
    runs-on: ubuntu-latest
    needs: meta
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install VS Code adapter dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run extension checks
        working-directory: editors/vscode
        run: |
          npm run check
          npm test
          xvfb-run -a npm run test:host

      - name: Run CLI checks
        run: |
          cargo test --workspace
          cargo run -p shosei-cli --bin shosei -- --help

  build-cli:
    needs:
      - meta
      - quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            archive_suffix: x86_64-unknown-linux-gnu
            archive_format: tar.gz
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            archive_suffix: x86_64-apple-darwin
            archive_format: tar.gz
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin
            archive_format: tar.gz
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            archive_suffix: x86_64-pc-windows-msvc
            archive_format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p shosei-cli --target ${{ matrix.rust_target }}

      - name: Resolve CLI archive name
        shell: bash
        run: |
          echo "ARCHIVE_NAME=shosei-${{ needs.meta.outputs.tag }}-${{ matrix.archive_suffix }}.${{ matrix.archive_format }}" >> "$GITHUB_ENV"

      - name: Package CLI archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp target/${{ matrix.rust_target }}/release/shosei release-assets/
          cp LICENSE README.md release-assets/
          tar -C release-assets -czf "${ARCHIVE_NAME}" shosei LICENSE README.md
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Package CLI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item target/${{ matrix.rust_target }}/release/shosei.exe release-assets/shosei.exe
          Copy-Item LICENSE, README.md release-assets
          Compress-Archive -Path release-assets/shosei.exe, release-assets/LICENSE, release-assets/README.md -DestinationPath $env:ARCHIVE_NAME -Force
          $hash = (Get-FileHash -Algorithm SHA256 $env:ARCHIVE_NAME).Hash.ToLower()
          "$hash  $env:ARCHIVE_NAME" | Out-File -FilePath "$env:ARCHIVE_NAME.sha256" -Encoding ascii

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: shosei-${{ needs.meta.outputs.tag }}-${{ matrix.archive_suffix }}.${{ matrix.archive_format }}
          path: |
            shosei-${{ needs.meta.outputs.tag }}-${{ matrix.archive_suffix }}.${{ matrix.archive_format }}
            shosei-${{ needs.meta.outputs.tag }}-${{ matrix.archive_suffix }}.${{ matrix.archive_format }}.sha256
          if-no-files-found: error

  build-vscode:
    needs:
      - meta
      - quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install VS Code adapter dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Package VSIX and run package smoke
        working-directory: editors/vscode
        run: xvfb-run -a npm run test:package-smoke

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.meta.outputs.vsix_name }}
          path: editors/vscode/${{ needs.meta.outputs.vsix_name }}
          if-no-files-found: error

  release:
    needs:
      - meta
      - build-cli
      - build-vscode
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
          RELEASE_TITLE: ${{ needs.meta.outputs.release_title }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; uploading assets."
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi

          mapfile -t assets < <(find release-assets -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber

  publish-openvsx:
    needs:
      - meta
      - build-vscode
      - release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.meta.outputs.vsix_name }}
          path: dist

      - name: Publish VSIX to Open VSX
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
          VSIX_NAME: ${{ needs.meta.outputs.vsix_name }}
        run: |
          set -euo pipefail

          if [[ -z "${OVSX_PAT:-}" ]]; then
            echo "OPEN_VSX_TOKEN is not set; skipping Open VSX publish."
            exit 0
          fi

          npx --yes ovsx@0.10.11 publish "dist/${VSIX_NAME}" --skip-duplicate

  publish-package-repo:
    needs:
      - meta
      - build-cli
      - release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve package repository
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ vars.TAP_REPO }}" ]]; then
            echo "PACKAGE_REPO=${{ vars.TAP_REPO }}" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_REPO=${GITHUB_REPOSITORY_OWNER}/stray-tools" >> "$GITHUB_ENV"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate package manager manifests
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          x86_sha_file="$(find dist -type f -name "shosei-${RELEASE_TAG}-x86_64-apple-darwin.tar.gz.sha256" -print -quit)"
          arm_sha_file="$(find dist -type f -name "shosei-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz.sha256" -print -quit)"
          win_sha_file="$(find dist -type f -name "shosei-${RELEASE_TAG}-x86_64-pc-windows-msvc.zip.sha256" -print -quit)"

          if [[ -z "${x86_sha_file}" || -z "${arm_sha_file}" || -z "${win_sha_file}" ]]; then
            echo "required checksum assets were not found for ${RELEASE_TAG}" >&2
            exit 1
          fi

          x86_sha="$(awk '{print $1}' "${x86_sha_file}")"
          arm_sha="$(awk '{print $1}' "${arm_sha_file}")"
          win_sha="$(awk '{print $1}' "${win_sha_file}")"

          ./scripts/generate-homebrew-formula.sh \
            --tag "${RELEASE_TAG}" \
            --repo "${SOURCE_REPO}" \
            --x86_64-macos-sha "${x86_sha}" \
            --arm64-macos-sha "${arm_sha}" \
            --output dist/shosei.rb

          ./scripts/generate-scoop-manifest.sh \
            --tag "${RELEASE_TAG}" \
            --repo "${SOURCE_REPO}" \
            --windows-sha "${win_sha}" \
            --output dist/shosei.json

      - name: Push manifests to package repository
        shell: bash
        env:
          STRAY_TOOLS_TOKEN: ${{ secrets.STRAY_TOOLS_TOKEN }}
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "${STRAY_TOOLS_TOKEN:-}" ]]; then
            echo "STRAY_TOOLS_TOKEN is not set; skipping package repository publish."
            exit 0
          fi

          if ! git clone "https://x-access-token:${STRAY_TOOLS_TOKEN}@github.com/${PACKAGE_REPO}.git" package-repo; then
            echo "Could not access ${PACKAGE_REPO}; skipping package repository publish."
            exit 0
          fi

          mkdir -p package-repo/Formula package-repo/bucket
          cp dist/shosei.rb package-repo/Formula/shosei.rb
          cp dist/shosei.json package-repo/bucket/shosei.json

          cd package-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/shosei.rb bucket/shosei.json

          if git diff --cached --quiet; then
            echo "Package manifests are already up to date"
            exit 0
          fi

          git commit -m "shosei ${RELEASE_TAG}"
          git push origin HEAD
